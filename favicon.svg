<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#131722"/>
  <!-- Cheese wedge -->
  <g transform="translate(4, 5)">
    <!-- Main wedge body -->
    <polygon points="2,20 22,20 22,12 2,20" fill="#C9A84C" opacity="0.85"/>
    <polygon points="2,20 22,12 12,2" fill="#C9A84C"/>
    <!-- Holes -->
    <circle cx="10" cy="14" r="2" fill="#131722"/>
    <circle cx="16" cy="12" r="1.4" fill="#131722"/>
    <circle cx="8" cy="18" r="1.2" fill="#131722"/>
    <!-- Edge highlight -->
    <line x1="2" y1="20" x2="22" y2="20" stroke="#E8C84C" stroke-width="0.8"/>
    <line x1="2" y1="20" x2="12" y2="2" stroke="#E8C84C" stroke-width="0.5" opacity="0.6"/>
  </g>
</svg>
