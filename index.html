<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KRX 라이브 차트</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
</head>
<body>

  <!-- HEADER -->
  <div id="header">
    <div id="logo">KRX <span>LIVE</span></div>
    <div id="search-wrap">
      <span id="search-icon">&#128269;</span>
      <input id="search-input" type="text" placeholder="종목명 또는 코드 검색..." autocomplete="off">
      <div id="search-dropdown"></div>
    </div>
    <div id="ticker-strip">
      <div class="ticker-item"><span class="ticker-name">KOSPI</span><span class="ticker-val up" id="t-kospi">&mdash;</span></div>
      <div class="ticker-item"><span class="ticker-name">KOSDAQ</span><span class="ticker-val up" id="t-kosdaq">&mdash;</span></div>
      <div class="ticker-item"><span class="ticker-name">USD/KRW</span><span class="ticker-val" id="t-usd">&mdash;</span></div>
    </div>
  </div>

  <!-- MAIN -->
  <div id="main">

    <!-- CHART AREA -->
    <div id="chart-area">
      <div id="watchlist"></div>
      <div id="chart-toolbar">
        <div id="stock-info">
          <span id="stock-name">삼성전자</span>
          <span id="stock-price" class="up">73,400</span>
          <span id="stock-change" class="up">&#9650; 1,200 (+1.66%)</span>
        </div>
        <div class="sep"></div>
        <button class="tf-btn active" data-tf="1m">1분</button>
        <div class="sep"></div>
        <button class="ct-btn active" data-ct="candle">캔들</button>
        <button class="ct-btn" data-ct="line">라인</button>
        <button class="ct-btn" data-ct="bar">바</button>
        <div class="sep"></div>
        <button class="ind-btn" data-ind="ma">MA</button>
        <button class="ind-btn" data-ind="ema">EMA</button>
        <button class="ind-btn" data-ind="bb">볼린저</button>
        <button class="ind-btn" data-ind="rsi">RSI</button>
        <button class="ind-btn" data-ind="macd">MACD</button>
        <button class="ind-btn" data-ind="vol">거래량</button>
      </div>
      <div id="chart-wrap">
        <div id="main-chart-container">
          <canvas id="mainChart"></canvas>
        </div>
        <div id="rsi-chart-container" class="sub-chart" style="display:none">
          <div class="sub-chart-label">RSI (14)</div>
          <canvas id="rsiChart"></canvas>
        </div>
        <div id="macd-chart-container" class="sub-chart" style="display:none">
          <div class="sub-chart-label">MACD (12, 26, 9)</div>
          <canvas id="macdChart"></canvas>
        </div>
      </div>
    </div>

    <!-- RIGHT PANEL -->
    <div id="right-panel">
      <div id="pattern-panel">
        <div id="pattern-header">&#128202; 패턴 분석</div>
        <div id="pattern-list">
          <div class="pattern-empty">분석 중...</div>
        </div>
      </div>
    </div>

    <!-- BOTTOM PANEL -->
    <div id="bottom-panel">
      <div id="bottom-header">
        <span>&#128200; 과거 실적 데이터</span>
        <button class="period-btn active" data-p="quarter">분기</button>
        <button class="period-btn" data-p="annual">연간</button>
      </div>
      <div id="past-table-wrap">
        <table id="past-table">
          <thead>
            <tr>
              <th>기간</th>
              <th>매출액 (억)</th>
              <th>영업이익 (억)</th>
              <th>순이익 (억)</th>
              <th>영업이익률</th>
              <th>EPS (원)</th>
              <th>ROE (%)</th>
            </tr>
          </thead>
          <tbody id="past-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- BOTTOM RIGHT -->
    <div id="bottom-right"></div>

  </div>

  <!-- JS: 순서 중요 (data → chart → app) -->
  <script src="js/data.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
